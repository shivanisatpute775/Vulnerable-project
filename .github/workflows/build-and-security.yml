name: Build & Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (Maven)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build & test (skip tests on this intentionally insecure lab)
        run: mvn -B -ntp -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: ignore
          retention-days: 7

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Secret scanning on every push ----
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Vulnerability-scanner agent ----
      # Runs the Claude Code CLI against .claude/agents/vulnerability-scanner.md
      # and writes SECURITY_ASSESSMENT_REPORT.md at the repo root.
      # Requires the ANTHROPIC_API_KEY repository secret to be configured.
      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run vulnerability-scanner agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude \
            --agent vulnerability-scanner \
            --print \
            --output-format text \
            "Run a full security assessment of this repository using .claude/agents/vulnerability-scanner.md. Write SECURITY_ASSESSMENT_REPORT.md at the repo root."

      - name: Upload vulnerability-scanner report
        if: always() && hashFiles('SECURITY_ASSESSMENT_REPORT.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: security-assessment-report
          path: SECURITY_ASSESSMENT_REPORT.md
          retention-days: 90

      # Also publish the report back to the repo so it shows up on the main branch
      # on the next push trigger (commit only if the file actually changed).
      - name: Commit report back to branch
        if: always() && hashFiles('SECURITY_ASSESSMENT_REPORT.md') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SECURITY_ASSESSMENT_REPORT.md
          if git diff --cached --quiet; then
            echo "No changes to report."
          else
            git commit -m "chore(security): refresh SECURITY_ASSESSMENT_REPORT.md"
            git push
          fi