name: Vulnerable App Automation (BDD)

# ---------------------------------------------------------------------------
# CI/CD pipeline for the Playwright_Automation BDD suite.
#
# This workflow is the single entry point for:
#   1. Building the vulnerable Spring Boot lab (mvn package)
#   2. Booting the lab as a background service on :8080
#   3. Running the Gherkin feature files (4 cases: VULN-001/002/006/007)
#      against BOTH stacks in parallel:
#        - Java stack   : Cucumber-JVM  + REST Assured + Playwright-Java
#        - JS   stack   : Cucumber-JS   + @playwright/test
#   4. Collecting, uploading, and summarising every report artefact
#
# Triggers:
#   - push / pull_request on main + feature/* (always runs the full suite)
#   - workflow_dispatch (manual) with optional vuln-id and stack filters
#   - schedule (nightly at 02:17 UTC) — keeps the lab honest on a cron
#
# Required repo secrets:
#   - ANTHROPIC_API_KEY          (only used if `with-ai-summary: true` is picked
#                                 in workflow_dispatch — see job "ai-summary")
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main, master, 'feature/**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      vuln_filter:
        description: >
          Cucumber tag filter. Use "@vuln-001", "@vuln-002", "@vuln-006",
          "@vuln-007", or leave blank for "@security and not @wip".
        required: false
        default: '@security and not @wip'
      stack:
        description: 'Which BDD stack to run'
        required: false
        type: choice
        default: both
        options:
          - both
          - java
          - js
      with_ai_summary:
        description: 'Append an AI-generated failure summary to the run report'
        required: false
        type: boolean
        default: false
  schedule:
    # Nightly at 02:17 UTC — picked deliberately off-the-hour to avoid the
    # GitHub Actions thundering-herd peak at 02:00.
    - cron: '17 2 * * *'

# Cancel an in-flight run for the same branch / PR when a new commit arrives
# — keeps the queue short on rapid pushes.
concurrency:
  group: vulnerable-automation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # for the optional PR-comment summary
  actions: read          # needed to read run metadata in summary steps

env:
  # Single source of truth for the URL the suite talks to. The Spring Boot
  # service container listens on :8080 and is reachable as "localhost" from
  # the same job.
  BASE_URL: http://localhost:8080
  API_BASE_URL: http://localhost:8080/api
  # All artefacts from one run land under this directory so the upload step
  # can ship them in one shot.
  ARTIFACT_DIR: vulnerable-automation-artifacts

jobs:
  # -----------------------------------------------------------------------
  # 1. Build the lab jar once and share it with the test jobs via the
  #    GitHub Actions workspace cache. No tests run here (per CLAUDE.md the
  #    parent project deliberately ships no `src/test`).
  # -----------------------------------------------------------------------
  build-lab:
    name: Build Spring Boot lab jar
    runs-on: ubuntu-latest
    outputs:
      jar-path: ${{ steps.find-jar.outputs.path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build lab (skip tests — none exist by design)
        run: mvn -B -ntp -DskipTests package

      - name: Locate produced jar
        id: find-jar
        run: |
          JAR=$(ls target/*.jar | head -n1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "Built jar: $JAR"

      - name: Cache jar for downstream jobs
        uses: actions/cache@v4
        with:
          path: target/*.jar
          key: lab-jar-${{ github.sha }}
          restore-keys: |
            lab-jar-

  # -----------------------------------------------------------------------
  # 2. The Spring Boot lab itself runs as a "service" so :8080 stays alive
  #    for the duration of a job. We use a wrapper job instead of the
  #    `services:` block so we can tee the startup log to a file we can
  #    ship as an artefact.
  # -----------------------------------------------------------------------
  start-lab:
    name: Boot Spring Boot lab on :8080
    runs-on: ubuntu-latest
    needs: build-lab
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Restore built jar from cache
        uses: actions/cache@v4
        with:
          path: target/*.jar
          key: lab-jar-${{ github.sha }}
          restore-keys: |
            lab-jar-

      - name: Boot lab in background
        id: boot
        run: |
          mkdir -p "$ARTIFACT_DIR"
          JAR=$(ls target/*.jar | head -n1)
          echo "Launching $JAR"
          # nohup + & detaches the JVM from the shell so the job step
          # finishes and the lab keeps running for the test job.
          nohup java -jar "$JAR" \
            --server.port=8080 \
            --spring.h2.console.enabled=false \
            > "$ARTIFACT_DIR/lab.log" 2>&1 &
          echo $! > /tmp/lab.pid
          echo "Lab PID: $(cat /tmp/lab.pid)"

      - name: Wait for /actuator/health (or /) to respond
        run: |
          # The lab has no actuator on this intentionally-insecure branch,
          # so fall back to a plain GET on "/" — a 302 to /login counts as
          # "the JVM is up and the filter chain is wired".
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' "$BASE_URL/" || true)
            if [ "$CODE" != "000" ] && [ "$CODE" != "404" ] && [ "$CODE" != "502" ] && [ "$CODE" != "503" ]; then
              echo "Lab is up (status $CODE) after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Lab failed to start within 60s. Last 200 log lines:"
          tail -n 200 "$ARTIFACT_DIR/lab.log" || true
          exit 1

      - name: Smoke-check seeded users
        run: |
          # Touch each seeded user — DataSeeder runs on startup, so a 200
          # proves both the DB and the BCrypt password hashing are live.
          for U in alice bob admin; do
            P="${U}123"
            CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              -H 'Content-Type: application/json' \
              -X POST -d "{\"username\":\"$U\",\"password\":\"$P\"}" \
              "$API_BASE_URL/login")
            echo "  $U -> $CODE"
            if [ "$CODE" != "200" ]; then
              echo "Seeded user $U did not authenticate (got $CODE)"
              tail -n 100 "$ARTIFACT_DIR/lab.log"
              exit 1
            fi
          done

      - name: Upload lab startup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab-startup-log
          path: vulnerable-automation-artifacts/lab.log
          if-no-files-found: ignore
          retention-days: 7

  # -----------------------------------------------------------------------
  # 3. Cucumber-JVM / Java stack. Primary, contract-driven runner.
  # -----------------------------------------------------------------------
  bdd-java:
    name: BDD (Java) — Cucumber-JVM + REST Assured + Playwright-Java
    runs-on: ubuntu-latest
    needs: [build-lab, start-lab]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.stack == 'both' || inputs.stack == 'java' }}
    env:
      CUCUMBER_FILTER_TAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.vuln_filter || '@security and not @wip' }}
      BASE_URL: ${{ env.BASE_URL }}
      API_BASE_URL: ${{ env.API_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Playwright Chromium (one-off, ~150 MB)
        run: mvn -B -ntp -f Playwright_Automation/pom.xml \
              dependency:resolve \
              && npx --yes playwright@1.45.0 install --with-deps chromium

      - name: Run Cucumber-JVM suite
        working-directory: Playwright_Automation
        run: |
          mkdir -p ../${{ env.ARTIFACT_DIR }}/bdd-java
          # Forward the tag filter via -D so it overrides the default in
          # pom.xml / cucumber.properties.
          mvn -B -ntp test \
            -Dcucumber.filter.tags="${CUCUMBER_FILTER_TAGS}" \
            -DbaseUrl="${BASE_URL}" \
            -DapiBaseUrl="${API_BASE_URL}"
        continue-on-error: true   # capture reports even on failure

      - name: Copy reports into artefact directory
        if: always()
        run: |
          mkdir -p "${{ env.ARTIFACT_DIR }}/bdd-java"
          cp -v Playwright_Automation/build/reports/*  "${{ env.ARTIFACT_DIR }}/bdd-java/" 2>/dev/null || true
          cp -v Playwright_Automation/target/surefire-reports/* "${{ env.ARTIFACT_DIR }}/bdd-java/" 2>/dev/null || true

      - name: Upload BDD-Java reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-java-reports
          path: ${{ env.ARTIFACT_DIR }}/bdd-java
          if-no-files-found: ignore
          retention-days: 30

  # -----------------------------------------------------------------------
  # 4. Cucumber-JS / Node stack. Parallel cross-check; only runs when the
  #    dispatch input lets it (or on push / schedule).
  # -----------------------------------------------------------------------
  bdd-js:
    name: BDD (JS) — Cucumber-JS + @playwright/test
    runs-on: ubuntu-latest
    needs: [build-lab, start-lab]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.stack == 'both' || inputs.stack == 'js' }}
    env:
      CUCUMBER_FILTER_TAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.vuln_filter || '@security and not @wip' }}
      BASE_URL: ${{ env.BASE_URL }}
      API_BASE_URL: ${{ env.API_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Playwright_Automation/package-lock.json

      - name: Install npm dependencies
        working-directory: Playwright_Automation
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: Playwright_Automation
        run: npx playwright install --with-deps chromium

      - name: Run Cucumber-JS suite
        working-directory: Playwright_Automation
        run: |
          mkdir -p ../${{ env.ARTIFACT_DIR }}/bdd-js
          # cucumber.js is configured to write progress + html + json into
          # build/reports; we mirror that into the artefact dir.
          npm test -- --tags "${CUCUMBER_FILTER_TAGS}"
        continue-on-error: true   # capture reports even on failure

      - name: Generate pretty HTML report
        if: always()
        working-directory: Playwright_Automation
        run: |
          if [ -f build/reports/cucumber.json ]; then
            node ./scripts/make-html-report.js
            cp -v build/reports/cucumber*.html "$GITHUB_WORKSPACE/${{ env.ARTIFACT_DIR }}/bdd-js/" 2>/dev/null || true
            cp -v build/reports/cucumber*.json "$GITHUB_WORKSPACE/${{ env.ARTIFACT_DIR }}/bdd-js/" 2>/dev/null || true
          else
            echo "No cucumber.json — suite did not reach the formatter step." >&2
          fi

      - name: Upload BDD-JS reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-js-reports
          path: ${{ env.ARTIFACT_DIR }}/bdd-js
          if-no-files-found: ignore
          retention-days: 30

  # -----------------------------------------------------------------------
  # 5. Aggregate. Always runs (even if the suites failed) so we always get
  #    a single combined run summary and a combined artefact bundle.
  # -----------------------------------------------------------------------
  summarize:
    name: Build combined run report
    runs-on: ubuntu-latest
    needs: [bdd-java, bdd-js]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download BDD-Java reports
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: bdd-java-reports
          path: ${{ env.ARTIFACT_DIR }}/bdd-java
          if-no-files-found: ignore
        continue-on-error: true

      - name: Download BDD-JS reports
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: bdd-js-reports
          path: ${{ env.ARTIFACT_DIR }}/bdd-js
          if-no-files-found: ignore
        continue-on-error: true

      - name: Download lab startup log
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: lab-startup-log
          path: ${{ env.ARTIFACT_DIR }}/lab
          if-no-files-found: ignore
        continue-on-error: true

      - name: Collect BDD-Java results
        if: always()
        run: |
          if [ -f "${{ env.ARTIFACT_DIR }}/bdd-java/cucumber.json" ]; then
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('${{ env.ARTIFACT_DIR }}/bdd-java/cucumber.json', 'utf8'));
              const s = r[0] || {};
              fs.writeFileSync('${{ env.ARTIFACT_DIR }}/bdd-java/summary.json', JSON.stringify({
                stack: 'java',
                total: (s.elements || []).length,
                passed: (s.elements || []).filter(e => e.steps && e.steps.every(st => st.result && st.result.status === 'passed')).length,
                failed: (s.elements || []).filter(e => e.steps && e.steps.some(st => st.result && st.result.status === 'failed')).length,
              }, null, 2));
            "
            cat "${{ env.ARTIFACT_DIR }}/bdd-java/summary.json"
          else
            echo '{"stack":"java","total":0,"passed":0,"failed":0,"note":"no cucumber.json"}' \
              > "${{ env.ARTIFACT_DIR }}/bdd-java/summary.json"
          fi

      - name: Collect BDD-JS results
        if: always()
        run: |
          if [ -f "${{ env.ARTIFACT_DIR }}/bdd-js/cucumber.json" ]; then
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('${{ env.ARTIFACT_DIR }}/bdd-js/cucumber.json', 'utf8'));
              const s = r[0] || {};
              fs.writeFileSync('${{ env.ARTIFACT_DIR }}/bdd-js/summary.json', JSON.stringify({
                stack: 'js',
                total: (s.elements || []).length,
                passed: (s.elements || []).filter(e => e.steps && e.steps.every(st => st.result && st.result.status === 'passed')).length,
                failed: (s.elements || []).filter(e => e.steps && e.steps.some(st => st.result && st.result.status === 'failed')).length,
              }, null, 2));
            "
            cat "${{ env.ARTIFACT_DIR }}/bdd-js/summary.json"
          else
            echo '{"stack":"js","total":0,"passed":0,"failed":0,"note":"no cucumber.json"}' \
              > "${{ env.ARTIFACT_DIR }}/bdd-js/summary.json"
          fi

      - name: Build RUN_REPORT.md
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          TAG_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.vuln_filter || '@security and not @wip' }}
          STACK_CHOICE: ${{ github.event_name == 'workflow_dispatch' && inputs.stack || 'both' }}
          BASE_URL: ${{ env.BASE_URL }}
        run: |
          ART="${{ env.ARTIFACT_DIR }}"
          JAVA_JSON="$(cat "$ART/bdd-java/summary.json" 2>/dev/null || echo '{}')"
          JS_JSON="$(cat "$ART/bdd-js/summary.json" 2>/dev/null || echo '{}')"
          {
            echo "# Vulnerable App Automation — Run Report"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| **Run** | ${RUN_ID} |"
            echo "| **Workflow** | ${WORKFLOW} |"
            echo "| **Trigger** | ${EVENT} |"
            echo "| **Ref** | \`${REF}\` |"
            echo "| **Commit** | \`${SHA}\` |"
            echo "| **Actor** | ${ACTOR} |"
            echo "| **Tag filter** | \`${TAG_FILTER}\` |"
            echo "| **Stack** | \`${STACK_CHOICE}\` |"
            echo "| **Base URL** | \`${BASE_URL}\` |"
            echo
            echo "## BDD — Java stack (Cucumber-JVM + REST Assured + Playwright-Java)"
            echo
            echo '```json'
            echo "${JAVA_JSON}"
            echo '```'
            echo
            echo "Artefacts:"
            echo "- \`cucumber.html\` — human-readable report"
            echo "- \`cucumber.json\` — machine-readable, fed into other tools"
            echo "- \`surefire-reports/\` — JUnit XML for downstream CI dashboards"
            echo
            echo "## BDD — JS stack (Cucumber-JS + @playwright/test)"
            echo
            echo '```json'
            echo "${JS_JSON}"
            echo '```'
            echo
            echo "Artefacts:"
            echo "- \`cucumber.html\` — progress formatter output"
            echo "- \`cucumber.json\` — machine-readable"
            echo "- \`cucumber-js.html\` — pretty HTML from \`npm run report\`"
            echo
            echo "## Lab startup log"
            echo
            echo "See \`lab/lab.log\` in this artefact bundle."
            echo
            echo "## How to view locally"
            echo
            echo '```bash'
            echo "# 1. Download the artefact bundle from the run page"
            echo "# 2. Open build/reports/cucumber.html in any browser"
            echo '```'
          } > "$ART/RUN_REPORT.md"
          cat "$ART/RUN_REPORT.md"

      - name: Write Job Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ env.ARTIFACT_DIR }}/RUN_REPORT.md';
            const body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : 'No report produced.';
            await core.summary.addRaw(body).write();

      - name: Upload combined artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerable-automation-report
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: ignore
          retention-days: 30

      - name: Comment on PR with run summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ env.ARTIFACT_DIR }}/RUN_REPORT.md';
            const body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : 'No report produced.';
            // Truncate to keep the comment under GitHub's 65 536-char cap.
            const trimmed = body.length > 60000 ? body.slice(0, 60000) + '\n\n…(truncated)' : body;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '<!-- vulnerable-automation -->\n' + trimmed,
            });

  # -----------------------------------------------------------------------
  # 7. Final gate. The suite jobs use continue-on-error so we can still
  #    produce a combined report, but the workflow itself must turn red if
  #    either suite actually failed. This job is the canonical "did the
  #    tests pass?" signal — branch protection rules should point here.
  # -----------------------------------------------------------------------
  result-gate:
    name: Result gate
    runs-on: ubuntu-latest
    needs:
      - build-lab
      - start-lab
      - bdd-java
      - bdd-js
    if: always()
    steps:
      - name: Decide pipeline outcome
        run: |
          echo "bdd-java: ${{ needs.bdd-java.result }}"
          echo "bdd-js:   ${{ needs.bdd-js.result }}"
          echo "build-lab: ${{ needs.build-lab.result }}"
          echo "start-lab: ${{ needs.start-lab.result }}"
          # If the lab failed to start, fail the gate. The suites are
          # permitted to fail (continue-on-error on the mvn/npm step) but
          # the lab not coming up is a hard environment problem.
          if [ "${{ needs.start-lab.result }}" != "success" ]; then
            echo "::error::Spring Boot lab failed to start. See artefact 'lab-startup-log'."
            exit 1
          fi
          # Fail the gate if either executed suite failed.
          if [ "${{ needs.bdd-java.result }}" = "failure" ] || [ "${{ needs.bdd-js.result }}" = "failure" ]; then
            echo "::error::One or more BDD suites failed. See 'vulnerable-automation-report' artefact."
            exit 1
          fi
          echo "All required BDD suites passed."

  # -----------------------------------------------------------------------
  # 6. Optional: AI-generated failure summary. Only kicks in when the
  #    user picked "with-ai-summary: true" on a manual dispatch AND the
  #    suites failed. Keeps the secret key off the default PR path.
  # -----------------------------------------------------------------------
  ai-summary:
    name: AI failure summary (optional)
    runs-on: ubuntu-latest
    needs: [summarize]
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.with_ai_summary == 'true' &&
      (needs.bdd-java.result == 'failure' || needs.bdd-js.result == 'failure')
    steps:
      - name: Download combined artefact
        uses: actions/download-artifact@v4
        with:
          name: vulnerable-automation-report
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: ignore

      - name: Install Claude Code CLI
        if: env.ANTHROPIC_API_KEY != ''
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate AI summary
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          REPORT="${{ env.ARTIFACT_DIR }}/RUN_REPORT.md"
          if [ ! -f "$REPORT" ]; then
            echo "No report file at $REPORT — nothing to summarise."
            exit 0
          fi
          claude --print --output-format text \
            "Read $REPORT and the cucumber.json files it points at. \
             Produce a short markdown triage: which scenarios failed, the \
             most likely cause for each, and the smallest set of source \
             files a developer should open first. Write the result to \
             ${{ env.ARTIFACT_DIR }}/AI_SUMMARY.md." \
            > "${{ env.ARTIFACT_DIR }}/ai-stdout.log" 2>&1 || true

      - name: Upload AI summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-summary
          path: |
            ${{ env.ARTIFACT_DIR }}/AI_SUMMARY.md
            ${{ env.ARTIFACT_DIR }}/ai-stdout.log
          if-no-files-found: ignore
          retention-days: 30
